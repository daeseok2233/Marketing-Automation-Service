# ═══════════════════════════════════════════════════════
#  블로그 파이프라인 설정 파일
#  API 키는 .env 파일에서 관리, 여기서는 동작 파라미터만
# ═══════════════════════════════════════════════════════

# ── 텍스트 생성 모델 (우선순위 순, 429 발생 시 다음 모델로 폴백)
text_models:
  - gemini-2.0-flash        # 1순위: 빠름, 15 RPM 무료
  - gemini-2.0-flash-lite   # 2순위: 더 빠름, 30 RPM 무료
  - gemini-2.5-flash-lite   # 3순위: 신규 경량, 독립 쿼터
  - gemini-2.5-flash        # 4순위: 고품질, 10 RPM 무료
  - gemini-flash-lite-latest # 5순위: 최신 lite 알리아스

# ── 이미지 생성 모델 (Gemini 유료 플랜 있을 때만 작동)
image_ai_models:
  - gemini-2.5-flash-image
  - gemini-3.1-flash-image-preview
  - gemini-3-pro-image-preview

# ── 이미지 소스 우선순위
#    local_sd / pexels / unsplash / pixabay / pollinations / gemini
#    A1111이 꺼져있거나 API 키가 없는 소스는 자동 스킵
image_source_order:
  - local_sd      # RTX 3060 SDXL 로컬 생성 (A1111 --api 실행 중일 때만 작동)
  - pexels        # 월 25,000회 무료
  - unsplash      # 시간당 50회 무료
  - pixabay       # 시간당 100회 무료
  - pollinations  # 무료 FLUX (서버 불안정)
  - gemini        # 유료 플랜 필요

# ── 이미지 크기 (pollinations 및 AI 생성용)
image_width: 1280
image_height: 720

# ── 포스트 생성 설정
posts_per_day: 9   # ALL_TEMPLATES 개수와 맞춰야 함 (보통 자동)

# ── 품질 검수 기준
quality:
  min_body_length: 1500    # 본문 최소 글자 수
  min_title_length: 15     # 제목 최소 글자 수
  min_service_mentions: 2  # 서비스명 최소 언급 횟수
  min_hashtags: 4          # 해시태그 최소 개수
  min_meta_length: 20      # 메타설명 최소 글자 수

# ── 생성할 템플릿 순서 (주석 처리하면 해당 템플릿 건너뜀)
templates:
  - info            # 정보·개념 설명형
  - howto           # 방법·절차 안내형
  - checklist       # 체크리스트·단계별 가이드형
  - compare         # 비교·선택 가이드형
  - faq             # FAQ 완전정복형
  - case            # 사례·분쟁 스토리형
  - industry-trend  # 업종 트렌드 분석형
  - data-analysis   # 데이터·통계 분석형
  - image-search-demo  # 마크뷰 AI 검색 체험형

# ── Ollama 폴백 (Gemini 전부 실패 시)
ollama_url: "http://localhost:11434"
